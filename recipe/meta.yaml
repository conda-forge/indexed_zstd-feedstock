{% set name = "indexed_zstd" %}
{% set version = "1.7.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b08f417c562f7e7c91454735d5ecec0a132fd0f4aa789b50bb1c6b466e14b504

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools >=42
    - cython
    - zstd
  run:
    - python
    - zstd

test:
  imports:
    - indexed_zstd
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/martinellimarco/indexed_zstd.git
  summary: Fast random access to zstd files
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ap--
    - martinellimarco
