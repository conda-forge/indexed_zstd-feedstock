{% set name = "indexed_zstd" %}
{% set version = "1.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0eca6a4f5e6b905eaa1acd3d97b1ade34078a829483a43839f5cf2efe97150f4

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools >=42
    - cython
    - zstd
  run:
    - python
    - zstd

test:
  imports:
    - indexed_zstd
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/martinellimarco/indexed_zstd.git
  summary: Fast random access to zstd files
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ap--
    - martinellimarco
